<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png" href="/favicon.png" />
        <title>Book My Ticket</title>
        <link rel="stylesheet" href="/css/main.css" />
        <link rel="stylesheet" href="/css/home.css" />
    </head>
    <body>
        <header id="site-header" class="topbar"></header>
        <main class="page">
            <section class="stack">
                <div id="flash-region"></div>
                <article class="hero">
                    <div class="hero-copy">
                        <h1 class="page-title" style="margin-top: 0">
                            ChaiCode Cinema
                        </h1>
                        <p class="page-subtitle">
                            Browse shows, open seats, and book instantly with a
                            clean interface that stays out of the way.
                        </p>
                    </div>
                </article>

                <section>
                    <div class="section-head">
                        <div>
                            <h2 class="section-title">Shows</h2>
                            <p class="section-note">
                                Pick a movie and jump straight to the booking
                                screen.
                            </p>
                        </div>
                    </div>
                    <div id="shows-grid" class="shows-grid"></div>
                </section>
            </section>
        </main>
        <footer id="site-footer" class="footer"></footer>
        <script type="module" src="/js/home.js"></script>
    </body>
</html>
