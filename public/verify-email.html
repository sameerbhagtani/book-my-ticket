<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png" href="/favicon.png" />
        <title>Verify Email · Book My Ticket</title>
        <link rel="stylesheet" href="/css/main.css" />
        <link rel="stylesheet" href="/css/auth.css" />
    </head>
    <body>
        <header id="site-header" class="topbar"></header>
        <main class="page">
            <section class="auth-shell">
                <div id="verify-notice"></div>
                <article class="auth-card card">
                    <div class="auth-head">
                        <h1 class="page-title">Verify your account</h1>
                        <p class="page-subtitle">
                            We are checking your verification link now.
                        </p>
                    </div>
                    <div id="verify-state" class="stack"></div>
                    <div class="auth-actions">
                        <a class="btn btn-primary" href="/login.html">Login</a>
                        <a class="btn btn-secondary" href="/">Home</a>
                    </div>
                </article>
            </section>
        </main>
        <footer id="site-footer" class="footer"></footer>
        <script type="module" src="/js/verify-email.js"></script>
    </body>
</html>
