<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png" href="/favicon.png" />
        <title>Reset Password · Book My Ticket</title>
        <link rel="stylesheet" href="/css/main.css" />
        <link rel="stylesheet" href="/css/auth.css" />
    </head>
    <body>
        <header id="site-header" class="topbar"></header>
        <main class="page">
            <section class="auth-shell">
                <div id="reset-notice"></div>
                <article class="auth-card card">
                    <div class="auth-head">
                        <h1 class="page-title">Reset password</h1>
                        <p class="page-subtitle">
                            Choose a new password and save it here.
                        </p>
                    </div>
                    <form id="reset-form" class="auth-form">
                        <div class="field">
                            <label for="reset-password">New password</label>
                            <input
                                id="reset-password"
                                name="password"
                                type="password"
                                class="input"
                                placeholder="New password"
                                required
                            />
                        </div>
                        <div class="actions">
                            <button
                                id="reset-submit"
                                type="submit"
                                class="btn btn-primary"
                            >
                                Reset password
                            </button>
                            <a class="btn btn-secondary" href="/login.html"
                                >Back to login</a
                            >
                        </div>
                    </form>
                </article>
            </section>
        </main>
        <footer id="site-footer" class="footer"></footer>
        <script type="module" src="/js/reset-password.js"></script>
    </body>
</html>
