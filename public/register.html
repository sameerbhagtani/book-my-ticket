<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png" href="/favicon.png" />
        <title>Register · Book My Ticket</title>
        <link rel="stylesheet" href="/css/main.css" />
        <link rel="stylesheet" href="/css/auth.css" />
    </head>
    <body>
        <header id="site-header" class="topbar"></header>
        <main class="page">
            <section class="auth-shell">
                <div id="register-notice"></div>
                <div class="auth-card card">
                    <div class="auth-head">
                        <h1 class="page-title">Register</h1>
                        <p class="page-subtitle">
                            Set up your account in a minute and start booking
                            right away.
                        </p>
                    </div>
                    <form id="register-form" class="auth-form">
                        <div class="field">
                            <label for="register-name">Name</label>
                            <input
                                id="register-name"
                                name="name"
                                type="text"
                                class="input"
                                placeholder="Your name"
                                required
                            />
                        </div>
                        <div class="field">
                            <label for="register-email">Email</label>
                            <input
                                id="register-email"
                                name="email"
                                type="email"
                                class="input"
                                placeholder="you@example.com"
                                required
                            />
                        </div>
                        <div class="field">
                            <label for="register-password">Password</label>
                            <input
                                id="register-password"
                                name="password"
                                type="password"
                                class="input"
                                placeholder="Choose a password"
                                required
                            />
                        </div>
                        <div class="actions">
                            <button
                                id="register-submit"
                                type="submit"
                                class="btn btn-primary"
                            >
                                Create account
                            </button>
                            <span class="auth-note"
                                >A verification link will be sent after sign
                                up.</span
                            >
                        </div>
                    </form>
                    <div class="auth-links">
                        <span>Already have an account?</span>
                        <a href="/login.html">Login</a>
                    </div>
                </div>
            </section>
        </main>
        <footer id="site-footer" class="footer"></footer>
        <script type="module" src="/js/register.js"></script>
    </body>
</html>
