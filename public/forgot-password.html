<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png" href="/favicon.png" />
        <title>Forgot Password · Book My Ticket</title>
        <link rel="stylesheet" href="/css/main.css" />
        <link rel="stylesheet" href="/css/auth.css" />
    </head>
    <body>
        <header id="site-header" class="topbar"></header>
        <main class="page">
            <section class="auth-shell">
                <div id="forgot-notice"></div>
                <article class="auth-card card">
                    <div class="auth-head">
                        <h1 class="page-title">Forgot password</h1>
                        <p class="page-subtitle">
                            Enter your email and we will send a reset link if
                            the account exists.
                        </p>
                    </div>
                    <form id="forgot-form" class="auth-form">
                        <div class="field">
                            <label for="forgot-email">Email</label>
                            <input
                                id="forgot-email"
                                name="email"
                                type="email"
                                class="input"
                                placeholder="you@example.com"
                                required
                            />
                        </div>
                        <div class="actions">
                            <button
                                id="forgot-submit"
                                type="submit"
                                class="btn btn-primary"
                            >
                                Send reset link
                            </button>
                            <a class="btn btn-secondary" href="/login.html"
                                >Back to login</a
                            >
                        </div>
                    </form>
                </article>
            </section>
        </main>
        <footer id="site-footer" class="footer"></footer>
        <script type="module" src="/js/forgot-password.js"></script>
    </body>
</html>
