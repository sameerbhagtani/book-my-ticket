services:
    postgres:
        image: postgres:17
        container_name: bmt_postgres
        restart: always

        ports:
            - "5432:5432"

        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: book_my_ticket

        volumes:
            - bmt_postgres_data:/var/lib/postgresql/data

volumes:
    bmt_postgres_data:
